<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>TOEIC 500→730 弱点単語アプリ</title><meta name="theme-color" content="#2563eb"><link rel="manifest" href="manifest.webmanifest"><link rel="apple-touch-icon" href="icon-192.png"><link rel="stylesheet" href="style.css"></head><body><main class="app"><header class="header"><div class="brand"><div class="logo">730</div><div><div class="title">TOEIC 500→730 弱点単語アプリ</div><div class="subtitle">間違えた語ほど出る・3〜4回連続正解で卒業・GitHub Pages対応</div></div></div><button class="btn danger" onclick="resetData()">リセット</button></header><section class="card stats"><div class="stat"><b id="session">0</b><span>今回回答</span></div><div class="stat"><b id="correct">0</b><span>累計正解</span></div><div class="stat"><b id="rate">0%</b><span>正答率</span></div><div class="stat"><b id="streak">0</b><span>連続正解</span></div><div class="stat"><b id="wrongWords">0</b><span>弱点語</span></div><div class="stat"><b id="mastered">0</b><span>卒業語</span></div></section><section class="card"><div class="toolbar"><button class="btn" data-mode="adaptive" onclick="setMode('adaptive')">適応型</button><button class="btn" data-mode="star" onclick="setMode('star')">★重要</button><button class="btn" data-mode="wrong" onclick="setMode('wrong')">間違いだけ</button><button class="btn" data-mode="part1" onclick="setMode('part1')">Part 1</button><button class="btn" data-mode="part57" onclick="setMode('part57')">Part 5/7</button><button class="btn" data-mode="mastered" onclick="setMode('mastered')">卒業語</button><button class="btn" onclick="showPlan()">21日プラン</button><button class="btn" onclick="exportData()">記録DL</button><label class="btn">記録復元<input class="fileInput" type="file" accept="application/json" onchange="importData(this.files[0])"></label></div><div id="plan" class="plan"></div></section><section class="card"><div class="questionHead"><div><span id="starBadge" class="badge star">★重要</span> <span id="catBadge" class="badge cat">Part 5/7</span> <span id="priorityBadge" class="badge cat">重要度</span> <span id="masterBadge" class="badge master hidden">卒業</span></div><div><span id="timeText">0s</span></div></div><div class="timerWrap"><div id="timerBar" class="timerBar"></div></div><div id="term" class="term">loading</div><div id="phrase" class="phrase"></div><div id="choices" class="choices"></div><div id="feedback" class="feedback"></div><div class="nav"><button class="btn" onclick="next()">次へ / Enter</button><div class="badge cat" id="titleRank">基礎固め中</div></div></section><section class="card"><b>自分メモ</b><textarea id="memo" oninput="saveMemo()" placeholder="例：conduct a survey、ensure that S V、mounted on the wall など"></textarea></section></main><script src="vocab.js"></script><script src="app.js"></script></body></html>
